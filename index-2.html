/* utils extras */
.metro-beat{width:18px;height:18px;border-radius:50%;background:var(--cbr-tertiary);border:1.5px solid var(--cbr-secondary);transition:all .08s;flex-shrink:0}
.metro-beat.active{background:#378ADD;border-color:#60a5fa;box-shadow:0 0 10px rgba(55,138,221,0.7);transform:scale(1.25)}
.metro-beat.accent{background:#EF9F27;border-color:#fbbf24;box-shadow:0 0 10px rgba(239,159,39,0.7);transform:scale(1.35)}
.interaction-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--cb-secondary);border-radius:var(--br-md);margin-bottom:6px}
.interaction-bar{height:5px;border-radius:99px;background:var(--cbr-tertiary);flex:1;overflow:hidden;min-width:60px}
.interaction-bar-fill{height:100%;border-radius:99px;background:#378ADD;transition:width .4s}
.toolbox-drawer{background:var(--cb-primary);border:0.5px solid var(--cbr-secondary)}
.color-swatches{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0;outline:3px solid transparent;outline-offset:2px}
.color-swatch.selected{outline-color:#60a5fa;transform:scale(1.12)}
.color-swatch.none{background:var(--cb-secondary);border:0.5px solid var(--cbr-secondary)}
.color-swatch.none.selected{outline-color:#60a5fa}
html.light .color-swatch.selected{outline-color:#1558a8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--body-bg);color:var(--ct-primary);font-family:var(--font-sans);min-height:100vh;overflow-x:hidden}
.app{padding:1rem;max-width:600px;margin:0 auto;overflow-x:hidden}
.screen{display:none;max-width:100vw;overflow-x:hidden}.screen.active{display:block}
/* sc-tree est fixed et sort du flux du .app */
#sc-tree{position:fixed;inset:0;background:var(--tree-bg);z-index:10;display:none;overflow:hidden}
#sc-tree.active{display:block}
.btn{font-size:12px;padding:6px 14px;border-radius:99px;border:0.5px solid var(--cbr-tertiary);background:none;color:var(--ct-secondary);cursor:pointer;transition:all .15s;font-family:var(--font-sans)}
.btn:hover{border-color:var(--cbr-secondary);color:var(--ct-primary)}
.btn-info{background:var(--cb-info);color:var(--ct-info);border-color:var(--cbr-info)}
.btn-warn{background:var(--cb-warning);color:var(--ct-warning);border-color:var(--cbr-warning)}
.btn-success{background:var(--cb-success);color:var(--ct-success);border-color:var(--cbr-success)}
.btn-danger{background:var(--cb-danger);color:var(--ct-danger);border-color:var(--cbr-danger)}
.btn-sm{font-size:11px;padding:3px 10px}
input,select,textarea{width:100%;font-size:13px;padding:8px 10px;border:0.5px solid var(--cbr-tertiary);border-radius:var(--br-md);background:var(--cb-secondary);color:var(--ct-primary);margin-bottom:10px;font-family:var(--font-sans)}
textarea{resize:vertical;min-height:64px;line-height:1.5}
.err{font-size:11px;color:var(--ct-danger);margin-bottom:8px;display:none}
.badge{font-size:11px;padding:3px 10px;border-radius:99px;border:0.5px solid}
.badge-prof{background:var(--cb-secondary);color:var(--ct-secondary);border-color:var(--cbr-tertiary)}
.badge-eleve{background:var(--cb-secondary);color:var(--ct-secondary);border-color:var(--cbr-tertiary)}
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.p-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--cb-secondary);border-radius:var(--br-lg);margin-bottom:1rem}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;border:0.5px solid var(--cbr-tertiary);flex-shrink:0}
.xp-track{flex:1;height:5px;background:var(--cb-primary);border-radius:99px;overflow:hidden;border:0.5px solid var(--cbr-tertiary)}
.xp-fill{height:100%;border-radius:99px;background:#378ADD;transition:width .5s}
.ctabs{display:flex;gap:6px;margin-bottom:1rem}
.ctab{flex:1;text-align:center;font-size:12px;padding:6px;border-radius:var(--br-md);border:0.5px solid var(--cbr-tertiary);cursor:pointer;color:var(--ct-secondary);background:var(--cb-secondary);transition:all .15s}
.ctab.active{background:var(--cb-info);color:var(--ct-info);border-color:var(--cbr-info)}

/* ── ARBRE PLEIN ÉCRAN ── */
/* Le screen #sc-tree occupe tout le viewport, sans padding .app */
#sc-tree{position:fixed;inset:0;background:var(--tree-bg);z-index:10;display:none;overflow:hidden}
#sc-tree.active{display:block}

/* Canvas plein écran */
.tree-fullscreen{position:absolute;inset:0;width:100%;height:100%}
canvas{display:block;width:100%;height:100%;cursor:default;position:absolute;inset:0;z-index:1}

/* Fond dégradé radial lisse — pas de grille */
.tree-bg{position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 70% at 50% 50%, #0b1022 0%, #060914 60%, #040810 100%);
  pointer-events:none;z-index:0}

/* Reflet holographique très atténué */
.holo-sheen{position:absolute;inset:0;pointer-events:none;z-index:2;
  background:linear-gradient(115deg,transparent 40%,rgba(80,160,255,0.012) 50%,transparent 60%);
  background-size:400% 100%;animation:sheenmove 16s ease-in-out infinite}
@keyframes sheenmove{0%,100%{background-position:-100% 0}50%{background-position:200% 0}}

/* ── HUD superposé ── */
.hud-layer{position:absolute;inset:0;pointer-events:none;z-index:5}
.hud-corner{position:absolute;width:20px;height:20px}
.hud-corner.tl{top:10px;left:10px;border-top:1.5px solid rgba(55,138,221,0.5);border-left:1.5px solid rgba(55,138,221,0.5)}
.hud-corner.tl.hidden{opacity:0}
.hud-corner.tr{top:10px;right:10px;border-top:1.5px solid rgba(55,138,221,0.5);border-right:1.5px solid rgba(55,138,221,0.5)}
.hud-corner.bl{bottom:10px;left:10px;border-bottom:1.5px solid rgba(55,138,221,0.5);border-left:1.5px solid rgba(55,138,221,0.5)}
.hud-corner.br{bottom:10px;right:10px;border-bottom:1.5px solid rgba(55,138,221,0.5);border-right:1.5px solid rgba(55,138,221,0.5)}
.hud-label{position:absolute;font-size:9px;letter-spacing:1.5px;color:rgba(55,138,221,0.4);font-family:var(--font-mono);text-transform:uppercase;white-space:nowrap}
.hud-label.top{top:8px;left:50%;transform:translateX(-50%)}
.hud-label.bot{bottom:8px;right:14px}

/* HUD barre haut : retour + badges + éditer */
.hud-topbar{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:transparent;
  pointer-events:none}
.hud-topbar.has-controls{background:linear-gradient(to bottom,rgba(6,9,20,0.85) 0%,transparent 100%)}
.hud-topbar>*{pointer-events:auto}

/* HUD barre bas : légende */
.hud-botbar{position:absolute;bottom:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:center;gap:16px;padding:80px 14px 12px;
  background:linear-gradient(to top,rgba(6,9,20,1) 0%,rgba(6,9,20,0.97) 30%,rgba(6,9,20,0.7) 58%,rgba(6,9,20,0.15) 85%,transparent 100%);
  pointer-events:none}
html.light .hud-botbar{background:linear-gradient(to top,rgba(242,245,255,1) 0%,rgba(242,245,255,0.97) 30%,rgba(242,245,255,0.7) 58%,rgba(242,245,255,0.15) 85%,transparent 100%)}

/* HUD profil gauche (bas-gauche) */
.hud-profile{position:absolute;bottom:36px;left:14px;z-index:20;display:flex;flex-direction:column;gap:6px;pointer-events:none;max-width:200px}
.hud-profile>*{pointer-events:auto}
.hud-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;border:1.5px solid rgba(255,255,255,0.2);cursor:pointer;transition:border-color .2s;overflow:hidden;flex-shrink:0;background-size:cover;background-position:center}
.hud-avatar:hover{border-color:rgba(55,138,221,0.8)}
.hud-name{font-size:15px;font-weight:600;color:var(--ct-primary);text-shadow:0 1px 4px rgba(0,0,0,0.9);line-height:1.2}
.hud-sub{font-size:11px;color:rgba(138,154,184,0.85);text-shadow:0 1px 3px rgba(0,0,0,0.8)}
.hud-xp-row{display:flex;align-items:center;gap:6px;margin-top:2px}
.hud-xp-track{width:100px;height:4px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden}
.hud-xp-fill{height:100%;border-radius:99px;background:#378ADD;transition:width .5s}
.hud-xp-txt{font-size:10px;color:rgba(138,154,184,0.7);font-family:var(--font-mono);white-space:nowrap}

/* HUD tabs cycles (haut droit) */
.hud-tabs{position:absolute;top:48px;right:14px;z-index:20;display:flex;flex-direction:column;gap:5px}
.hud-tab{font-size:11px;padding:5px 12px;border-radius:99px;border:0.5px solid var(--cbr-tertiary);cursor:pointer;color:var(--ct-secondary);background:rgba(15,20,32,0.75);transition:all .15s;font-family:var(--font-sans);backdrop-filter:blur(4px)}
.hud-tab.active{background:rgba(30,58,95,0.85);color:var(--ct-info);border-color:var(--cbr-info)}

/* Popup compétence */

/* ── AUTO-ÉVALUATION ÉLÈVE ── */
.self-eval-wrap{margin-top:10px;border-top:0.5px solid rgba(55,138,221,0.2);padding-top:10px}
.self-eval-label{font-size:11px;color:var(--ct-secondary);margin-bottom:6px}
.self-eval-slider{width:100%;accent-color:#378ADD;cursor:pointer;height:4px;margin:0 0 4px}
.self-eval-ticks{display:grid;grid-template-columns:repeat(11,1fr);font-size:9px;color:var(--ct-tertiary);font-family:var(--font-mono);margin-bottom:6px}
.self-eval-ticks span{text-align:center;}
.self-eval-score{font-size:22px;font-weight:700;font-family:var(--font-mono);text-align:center;margin:4px 0;transition:color .2s}
.self-eval-send{width:100%;margin-top:4px;font-size:11px;padding:5px 0;border-radius:99px}
.self-eval-prof-score{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:2px 8px;border-radius:99px;border:0.5px solid;margin-top:4px}
.eval-pending-badge{display:inline-block;min-width:16px;height:16px;border-radius:99px;background:#f87171;color:#fff;font-size:9px;font-weight:700;text-align:center;line-height:16px;padding:0 4px;margin-left:4px;vertical-align:middle}
.popup{position:fixed;background:rgba(6,9,20,0.97);border:0.5px solid rgba(55,138,221,0.4);border-radius:var(--br-lg);padding:12px 14px;width:240px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:30;
  box-shadow:0 0 24px rgba(55,138,221,0.15);backdrop-filter:blur(6px)}
.popup.visible{opacity:1;pointer-events:auto}
.popup-title{font-size:13px;font-weight:500;color:var(--ct-primary);margin-bottom:2px}
.popup-branch{font-size:11px;margin-bottom:8px}
.popup-status{font-size:11px;padding:3px 10px;border-radius:99px;border:0.5px solid;display:inline-block;margin-bottom:8px}
.popup-desc{font-size:12px;color:var(--ct-secondary);line-height:1.5;margin-bottom:8px}
.popup-todo{font-size:11px;color:var(--ct-secondary);line-height:1.6;border-top:0.5px solid rgba(55,138,221,0.2);padding-top:8px}
.popup-todo strong{font-weight:500;color:var(--ct-primary);display:block;margin-bottom:3px}
.popup-close{position:absolute;top:8px;right:10px;font-size:14px;color:var(--ct-tertiary);cursor:pointer;background:none;border:none;line-height:1;padding:2px 4px}
.sb{font-size:11px;padding:4px 12px;border-radius:99px;border:0.5px solid var(--cbr-tertiary);cursor:pointer;background:none;color:var(--ct-secondary);transition:all .15s;font-family:var(--font-sans)}
.sb.sl{background:var(--cb-secondary);color:var(--ct-tertiary)}
.sb.sp2{background:var(--cb-warning);color:var(--ct-warning);border-color:var(--cbr-warning)}
.sb.sd{background:var(--cb-success);color:var(--ct-success);border-color:var(--cbr-success)}

/* légende bas */
.leg{display:flex;gap:14px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(138,154,184,0.6)}
.ld{width:9px;height:9px;border-radius:50%}

/* ── DRAWER PROFIL ÉLÈVE ── */
.profile-drawer{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center}
.profile-drawer.hidden{display:none}
.profile-drawer-bg{position:absolute;inset:0;background:rgba(0,0,0,0.6);cursor:pointer}
.profile-drawer-box{position:relative;width:min(440px,100%);max-height:80vh;overflow-y:auto;background:#0d1220;border-radius:18px 18px 0 0;border:0.5px solid rgba(55,138,221,0.25);padding:20px;box-shadow:0 -8px 40px rgba(0,0,0,0.5);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.drawer-handle{width:36px;height:4px;background:rgba(255,255,255,0.12);border-radius:99px;margin:0 auto 16px}

/* Avatar picker */
.avatar-picker{display:flex;justify-content:center;margin-bottom:16px}
.av-big{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;border:2px solid rgba(55,138,221,0.4);cursor:pointer;position:relative;overflow:hidden;background-size:cover;background-position:center;transition:border-color .2s}
.av-big:hover{border-color:rgba(55,138,221,0.8)}
.av-big-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:20px}
.av-big:hover .av-big-overlay{opacity:1}
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:12px}
.emoji-opt{font-size:22px;padding:8px;border-radius:var(--br-md);border:0.5px solid transparent;cursor:pointer;text-align:center;transition:all .15s;background:none}
.emoji-opt:hover,.emoji-opt.selected{background:var(--cb-secondary);border-color:var(--cbr-info)}
.av-photo-label{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--ct-info);cursor:pointer;padding:8px;border:0.5px dashed var(--cbr-info);border-radius:var(--br-md);transition:background .15s}
.av-photo-label:hover{background:var(--cb-info)}
.std-list{display:flex;flex-direction:column;gap:8px;margin-top:1rem}
.std-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--cb-primary);border:0.5px solid var(--cbr-tertiary);border-radius:var(--br-lg);flex-wrap:wrap}
.code-pill{font-size:11px;padding:3px 8px;border-radius:99px;background:var(--cb-secondary);border:0.5px solid var(--cbr-tertiary);color:var(--ct-secondary);font-family:var(--font-mono)}
.school-group{margin-bottom:1.2rem}
.school-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--cb-secondary);border-radius:var(--br-md);margin-bottom:6px;border:0.5px solid var(--cbr-tertiary)}
.edit-panel{background:var(--cb-primary);border:0.5px solid var(--cbr-tertiary);border-radius:var(--br-lg);overflow:hidden;margin-bottom:1rem}
.ep-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--cbr-tertiary);background:var(--cb-secondary)}
.branch-section{border-bottom:0.5px solid var(--cbr-tertiary)}.branch-section:last-child{border-bottom:none}
.branch-header{display:flex;align-items:center;gap:8px;padding:10px 16px;cursor:pointer;user-select:none}
.branch-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.branch-chev{font-size:11px;color:var(--ct-tertiary);transition:transform .2s}.branch-chev.open{transform:rotate(90deg)}
.skills-table{display:none;padding:0 16px 12px}.skills-table.open{display:block}
.skill-edit-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--cbr-tertiary)}.skill-edit-row:last-child{border-bottom:none}
.seg{display:flex;border:0.5px solid var(--cbr-tertiary);border-radius:99px;overflow:hidden;flex-shrink:0}
.seg-btn{font-size:11px;padding:4px 10px;background:none;border:none;cursor:pointer;color:var(--ct-secondary);font-family:var(--font-sans);transition:all .15s;white-space:nowrap}
.seg-btn:hover{background:var(--cb-secondary)}
.seg-btn.act-l{background:var(--cb-secondary);color:var(--ct-tertiary)}
.seg-btn.act-p{background:var(--cb-warning);color:var(--ct-warning)}
.seg-btn.act-d{background:var(--cb-success);color:var(--ct-success)}
.branch-all-done{font-size:11px;padding:3px 10px;border-radius:99px;border:0.5px solid;background:none;cursor:pointer;font-family:var(--font-sans);white-space:nowrap}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal-box{background:#0d1220;border:0.5px solid rgba(55,138,221,0.3);border-radius:var(--br-lg);padding:22px;width:min(420px,100%);max-height:88vh;overflow-y:auto;box-shadow:0 0 40px rgba(55,138,221,0.1)}
.modal-box h3{font-size:14px;font-weight:500;color:var(--ct-primary);margin-bottom:4px}
.modal-box p{font-size:12px;color:var(--ct-secondary);margin-bottom:14px;line-height:1.5}
.modal-footer{display:flex;gap:8px;margin-top:4px}
.modal-footer button{flex:1}
.field-label{font-size:11px;color:var(--ct-secondary);margin-bottom:4px;margin-top:2px}
.ce-section{background:var(--cb-primary);border:0.5px solid var(--cbr-tertiary);border-radius:var(--br-lg);margin-bottom:1rem;overflow:hidden}
.ce-section-header{display:flex;align-items:center;gap:8px;padding:11px 14px;background:var(--cb-secondary);border-bottom:0.5px solid var(--cbr-tertiary)}
.ce-skill-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:0.5px solid var(--cbr-tertiary)}.ce-skill-row:last-child{border-bottom:none}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:var(--br-sm);font-size:13px;line-height:1;transition:background .15s}
.icon-btn:hover{background:var(--cb-secondary)}
.icon-btn.del:hover{background:var(--cb-danger)}
.settings-card{background:var(--cb-primary);border:0.5px solid var(--cbr-tertiary);border-radius:var(--br-lg);padding:18px;margin-bottom:1rem}
.settings-card h4{font-size:13px;font-weight:500;color:var(--ct-primary);margin-bottom:4px}
.settings-card p{font-size:12px;color:var(--ct-secondary);margin-bottom:14px;line-height:1.5}
.pw-strength{height:3px;border-radius:99px;margin-bottom:10px;transition:width .3s,background .3s}

/* ── EXAM ATTENTE (dans plein écran) ── */
.exam-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem 1rem;background:#060914;overflow:hidden}
.exam-title{font-size:20px;font-weight:600;color:#EF9F27;margin-bottom:.5rem}
.exam-sub{font-size:13px;color:#6a7a9a;line-height:1.6;margin-bottom:1.5rem;max-width:320px}
.exam-cycle-badge{font-size:11px;padding:4px 14px;border-radius:99px;background:#3a2800;color:#EF9F27;border:0.5px solid #EF9F27;margin-bottom:1.5rem;display:inline-block}
.exam-pulse{width:80px;height:80px;border-radius:50%;background:rgba(239,159,39,.08);border:1.5px solid rgba(239,159,39,.4);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,159,39,.3)}50%{box-shadow:0 0 0 16px rgba(239,159,39,0)}}
.particle{position:absolute;border-radius:50%;animation:drift linear infinite}
@keyframes drift{0%{transform:translateY(0) scale(1);opacity:.2}100%{transform:translateY(-500px) scale(.2);opacity:0}}

/* Vue édition : panneau flottant par-dessus l'arbre */
#view-edit{position:absolute;inset:0;z-index:40;background:rgba(6,9,20,0.97);overflow-y:auto;padding:14px}

/* Vue examen : par-dessus tout, y compris le HUD */
#view-exam{position:absolute;inset:0;z-index:45;display:none}

/* ── FÉLICITATIONS ── */
.congrats-overlay{position:fixed;inset:0;background:rgba(4,8,20,0.97);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
.congrats-overlay.active{display:flex}
.congrats-stars{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.star{position:absolute;border-radius:50%;animation:starfall linear infinite}
@keyframes starfall{0%{transform:translateY(-20px) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(100vh) scale(1);opacity:0}}
.congrats-ring{width:120px;height:120px;border-radius:50%;border:2px solid rgba(55,138,221,0.5);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;position:relative;animation:congRing 2s ease-in-out infinite}
@keyframes congRing{0%,100%{box-shadow:0 0 0 0 rgba(55,138,221,0.4),0 0 30px rgba(55,138,221,0.2)}50%{box-shadow:0 0 0 20px rgba(55,138,221,0),0 0 50px rgba(55,138,221,0.3)}}
.congrats-title{font-size:26px;font-weight:600;background:linear-gradient(135deg,#60a5fa,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.5rem;animation:fadeUp .6s ease both}
.congrats-sub{font-size:14px;color:var(--ct-secondary);margin-bottom:0.5rem;line-height:1.6;max-width:360px;animation:fadeUp .6s .15s ease both;opacity:0}
.congrats-note-badge{font-size:22px;font-weight:600;color:#34d399;margin:0.5rem 0 1rem;animation:fadeUp .6s .25s ease both;opacity:0}
.congrats-next{font-size:13px;color:var(--ct-info);background:var(--cb-info);border:0.5px solid var(--cbr-info);border-radius:99px;padding:8px 20px;margin-bottom:1.5rem;display:inline-block;animation:fadeUp .6s .35s ease both;opacity:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.congrats-date{font-size:11px;color:var(--ct-tertiary);font-family:var(--font-mono);animation:fadeUp .6s .45s ease both;opacity:0}

/* ── BOARD PARTAGE ── */
#sc-board{position:fixed;inset:0;background:var(--cb-primary);z-index:10;display:none;overflow:hidden;flex-direction:column;padding:0}
#sc-board.board-open{display:flex!important}
#sc-board.active{display:flex}
.board-inner{display:flex;flex-direction:column;height:100%;padding:20px 24px 0}
.board-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:8px;flex-shrink:0}
.board-header-title{font-size:22px;font-weight:600;color:var(--ct-primary);margin-bottom:2px}
.board-header-sub{font-size:13px;color:var(--ct-secondary)}
/* Layout colonnes horizontal scroll */
.board-columns-wrap{overflow-x:auto;overflow-y:hidden;flex:1;padding-bottom:20px;margin:0 -4px;padding-left:4px}
.board-columns{display:flex;gap:18px;align-items:flex-start;height:100%;padding-bottom:4px;width:max-content;min-width:calc(100% - 8px)}
.board-col{width:260px;flex-shrink:0;background:var(--cb-secondary);border-radius:var(--br-lg);border:0.5px solid var(--cbr-tertiary);display:flex;flex-direction:column;max-height:calc(100vh - 130px);overflow:hidden}
.board-col.col-drag-over{border-color:var(--cbr-info);box-shadow:0 0 0 2px rgba(55,138,221,.25)}
.board-col-header{padding:12px 14px;display:flex;align-items:center;gap:6px;border-bottom:0.5px solid var(--cbr-tertiary);flex-shrink:0}
.board-col-title{font-size:15px;font-weight:600;color:var(--ct-primary);flex:1;background:none;border:none;cursor:text;font-family:var(--font-sans);padding:2px 4px;border-radius:4px;outline:none;margin-bottom:0}
.board-col-title:hover{background:var(--cb-primary)}
.board-col-title:focus{background:var(--cb-primary);box-shadow:0 0 0 1px var(--cbr-info)}
.board-col-menu{background:none;border:none;cursor:pointer;color:var(--ct-tertiary);font-size:18px;padding:2px 5px;border-radius:4px;line-height:1}
.board-col-menu:hover{color:var(--ct-primary);background:var(--cb-primary)}
.board-col-tiles{overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px;flex:1}
.board-col-footer{padding:8px 10px;flex-shrink:0;border-top:0.5px solid var(--cbr-tertiary)}
/* Bouton ajouter colonne */
.add-col-btn{width:220px;flex-shrink:0;border:0.5px dashed var(--cbr-secondary);background:none;border-radius:var(--br-lg);min-height:80px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ct-tertiary);font-size:13px;gap:6px;transition:all .15s;font-family:var(--font-sans);align-self:flex-start}
.add-col-btn:hover{border-color:var(--cbr-info);color:var(--ct-info);background:var(--cb-info)}
/* Tuiles */
.tile{background:var(--cb-primary);border:0.5px solid var(--cbr-tertiary);border-radius:var(--br-md);overflow:hidden;cursor:default;transition:box-shadow .15s;position:relative;user-select:none}
.tile:hover{box-shadow:0 3px 14px rgba(0,0,0,.4);border-color:var(--cbr-secondary)}
.tile.dragging{opacity:.5;transform:scale(.97);cursor:grabbing}
.tile.tile-drag-over{border-color:var(--cbr-info);box-shadow:0 0 0 2px rgba(55,138,221,.25)}
/* Variantes taille */
.tile-size-sm .tile-preview,.tile-size-sm .tile-preview-placeholder{height:60px}
.tile-size-sm .tile-embed-yt{height:120px}
.tile-size-sm .tile-embed-sp{height:70px}
.tile-size-lg .tile-preview,.tile-size-lg .tile-preview-placeholder{height:180px}
.tile-size-lg .tile-embed-yt{height:200px}
.tile-size-lg .tile-embed-sp{height:110px}
/* Tuile couleur custom */
.tile[data-color]{border-color:var(--tile-color)!important}
.tile[data-color] .tile-body{background:color-mix(in srgb,var(--tile-color) 8%,transparent)}
.tile-grab{display:none;position:absolute;top:0;left:0;right:0;height:28px;cursor:grab;align-items:center;justify-content:center;background:linear-gradient(rgba(8,12,24,.7),transparent);font-size:11px;color:var(--ct-tertiary);gap:3px;z-index:3}
.tile:hover .tile-grab{display:flex}
.tile-preview{width:100%;height:120px;object-fit:cover;display:block}
.tile-preview-placeholder{width:100%;height:90px;display:flex;align-items:center;justify-content:center;font-size:30px;background:var(--cb-secondary);border-bottom:0.5px solid var(--cbr-tertiary)}
/* Media (YouTube/Spotify) */
.tile-embed{width:100%;border:none;display:block}
.tile-embed-yt{height:155px}
.tile-embed-sp{height:90px}
/* Bouton Spotify ouverture externe */
.spotify-open-btn{display:flex;align-items:center;gap:8px;padding:12px;background:linear-gradient(135deg,#1e3a2f,#0a1e15);cursor:pointer;border-bottom:0.5px solid var(--cbr-tertiary);transition:all .15s}
.spotify-open-btn:hover{background:linear-gradient(135deg,#1a5c3a,#0d2b1d)}
.spotify-open-btn svg{flex-shrink:0}
.tile-body{padding:9px 12px}
.tile-title{font-size:13px;font-weight:500;color:var(--ct-primary);margin-bottom:3px;line-height:1.35;word-break:break-word}
.tile-meta{font-size:10px;color:var(--ct-tertiary);display:flex;align-items:center;gap:4px;flex-wrap:nowrap;overflow:hidden}
.tile-type-badge{font-size:10px;padding:1px 6px;border-radius:99px;border:0.5px solid;flex-shrink:0}.add-tile-btn-small{border:0.5px dashed var(--cbr-tertiary);background:none;border-radius:var(--br-md);padding:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ct-tertiary);font-size:11px;gap:5px;transition:all .15s;width:100%;font-family:var(--font-sans)}
.add-tile-btn-small:hover{border-color:var(--cbr-info);color:var(--ct-info);background:var(--cb-info)}
.board-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1rem;color:var(--ct-tertiary);font-size:13px;text-align:center;width:100%}
/* Modal board */
#modal-tile .modal-box{max-width:460px;max-height:90vh;overflow-y:auto}
.tile-type-picker{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px}
.tile-type-opt{padding:9px 4px;border-radius:var(--br-md);border:0.5px solid var(--cbr-tertiary);cursor:pointer;text-align:center;font-size:10px;color:var(--ct-secondary);background:none;transition:all .15s;font-family:var(--font-sans)}
.tile-type-opt:hover,.tile-type-opt.selected{background:var(--cb-info);color:var(--ct-info);border-color:var(--cbr-info)}
.tile-type-opt span{display:block;font-size:20px;margin-bottom:3px}
.media-preview-box{border-radius:var(--br-md);overflow:hidden;margin-top:8px;margin-bottom:10px;border:0.5px solid var(--cbr-tertiary)}
.audio-player{padding:8px 10px;background:var(--cb-secondary);border-top:0.5px solid var(--cbr-tertiary)}
.audio-player audio{width:100%;height:34px}
/* Swatch couleur */
/* color-swatch rules defined above */

/* ── GEAR BUTTON TUILE ── */
.tile-gear-wrap{position:absolute;top:5px;right:5px;z-index:5}
.tile-gear-btn{width:26px;height:26px;border-radius:50%;border:0.5px solid var(--cbr-tertiary);background:rgba(15,20,32,0.82);color:var(--ct-tertiary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;backdrop-filter:blur(4px);opacity:0;pointer-events:none}
.tile:hover .tile-gear-btn{opacity:1;pointer-events:auto}
.tile-gear-btn:hover{border-color:var(--cbr-info);color:var(--ct-info);background:rgba(30,58,95,0.92)}
html.light .tile-gear-btn{background:rgba(255,255,255,0.92)}
html.light .tile:hover .tile-gear-btn{opacity:1}

/* ── GEAR BUTTON SECTION PADLET ── */
.board-col-gear-btn{width:26px;height:26px;border-radius:50%;border:0.5px solid var(--cbr-tertiary);background:none;color:var(--ct-tertiary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;padding:0}
.board-col-gear-btn:hover{border-color:var(--cbr-info);color:var(--ct-info);background:var(--cb-info)}

/* ── DROPDOWN MENU CONTEXTUEL ── */
.ctx-menu{position:fixed;z-index:9500;background:var(--cb-primary);border:0.5px solid var(--cbr-secondary);border-radius:var(--br-lg);padding:6px;min-width:180px;box-shadow:0 8px 32px rgba(0,0,0,0.45);animation:ctxFadeIn .12s ease}
@keyframes ctxFadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.ctx-menu-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--br-md);font-size:12px;color:var(--ct-secondary);cursor:pointer;transition:all .12s;border:none;background:none;width:100%;text-align:left;font-family:var(--font-sans)}
.ctx-menu-item:hover{background:var(--cb-secondary);color:var(--ct-primary)}
.ctx-menu-item.danger{color:var(--ct-danger)}
.ctx-menu-item.danger:hover{background:var(--cb-danger)}
.ctx-menu-sep{height:0.5px;background:var(--cbr-tertiary);margin:4px 6px}

/* ── FENÊTRE APERÇU TUILE ── */
#tile-preview-win{font-family:var(--font-sans);animation:ctxFadeIn .15s ease}
html.light #tile-preview-win{background:#fff;border-color:var(--cbr-tertiary);box-shadow:0 8px 32px rgba(80,100,150,0.18)}

/* ── BOUTON EXPAND APERÇU ── */
.tile-expand-btn{margin-left:2px;flex-shrink:0;background:none;border:0.5px solid var(--cbr-tertiary);border-radius:50%;width:28px;height:28px;padding:0;color:var(--ct-tertiary);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center}
.tile-expand-btn:hover{border-color:var(--cbr-info);color:var(--ct-info);background:var(--cb-info)}

/* ── SOUS-ONGLETS FICHIERS ── */
.file-sub-tab{outline:none;flex:1;font-size:11px;padding:6px 4px;border-radius:6px;border:none;background:none;color:var(--ct-secondary);cursor:pointer;font-family:var(--font-sans);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap}
.file-sub-tab:hover:not(.active){background:var(--cb-primary);color:var(--ct-primary)}
.file-sub-tab.active{background:var(--cb-info);color:var(--ct-info)}
.ctx-color-row{display:flex;gap:5px;padding:6px 10px;flex-wrap:wrap;align-items:center}
.ctx-color-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.ctx-color-dot:hover,.ctx-color-dot.active{border-color:#fff;transform:scale(1.18)}
.ctx-color-dot.none{background:var(--cb-secondary);border-color:var(--cbr-tertiary)}
html.light .ctx-menu{background:#fff;border-color:var(--cbr-tertiary);box-shadow:0 4px 24px rgba(80,100,150,0.18)}
#sc-toolbox{position:fixed;inset:0;z-index:15;display:none;overflow:hidden;
  background:radial-gradient(ellipse 80% 80% at 50% 40%,#0d1830 0%,#080d1a 60%,#050810 100%)}
#sc-toolbox.active{display:block}
html.light #sc-toolbox{background:radial-gradient(ellipse 80% 80% at 50% 40%,#dce8ff 0%,#eaeff8 60%,#dde4f2 100%)}

/* Topbar outils */
.toolbox-topbar{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:10px;
  padding:12px 18px;background:linear-gradient(to bottom,rgba(5,8,16,0.9) 0%,transparent 100%);pointer-events:none}
.toolbox-topbar>*{pointer-events:auto}
html.light .toolbox-topbar{background:linear-gradient(to bottom,rgba(220,232,255,0.94) 0%,transparent 100%)}
html.light .toolbox-topbar .btn{background:rgba(255,255,255,0.88)!important;color:var(--ct-secondary)!important;border-color:var(--cbr-secondary)!important}

/* Dock en bas */
.toolbox-dock{position:absolute;bottom:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:14px 20px 20px;
  background:linear-gradient(to top,rgba(5,8,16,0.92) 0%,transparent 100%)}
html.light .toolbox-dock{background:linear-gradient(to top,rgba(220,232,255,0.94) 0%,transparent 100%)}
.dock-btn{display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 14px;border-radius:14px;cursor:pointer;transition:all .18s;
  border:0.5px solid var(--cbr-tertiary);background:rgba(15,20,32,0.7);
  min-width:72px;backdrop-filter:blur(8px);user-select:none}
.dock-btn:hover{background:rgba(30,42,64,0.85);border-color:var(--cbr-secondary);transform:translateY(-3px)}
.dock-btn.active{background:rgba(30,58,95,0.85);border-color:var(--cbr-info)}
html.light .dock-btn{background:rgba(255,255,255,0.82);border-color:var(--cbr-secondary)}
html.light .dock-btn:hover{background:rgba(240,244,251,0.95);border-color:var(--cbr-info)}
html.light .dock-btn.active{background:var(--cb-info);border-color:var(--cbr-info)}
.dock-icon{font-size:24px;line-height:1}
.dock-label{font-size:10px;color:var(--ct-tertiary);font-family:var(--font-sans);white-space:nowrap}
.dock-btn.active .dock-label{color:var(--ct-info)}
html.light .dock-label{color:var(--ct-secondary)}

/* Fenêtres flottantes */
.float-win{position:absolute;min-width:280px;max-width:min(480px,90vw);
  background:rgba(10,14,28,0.97);border:0.5px solid var(--cbr-secondary);
  border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,0.6);overflow:hidden;
  display:none;z-index:10}
.float-win.open{display:block}
html.light .float-win{background:rgba(255,255,255,0.98);box-shadow:0 8px 40px rgba(80,100,150,0.18)}
.float-win-bar{display:flex;align-items:center;gap:8px;padding:9px 12px;
  background:rgba(20,28,48,0.95);cursor:grab;user-select:none;border-bottom:0.5px solid var(--cbr-tertiary)}
.float-win-bar:active{cursor:grabbing}
html.light .float-win-bar{background:var(--cb-secondary)}
.float-win-title{flex:1;font-size:12px;font-weight:500;color:var(--ct-secondary)}
.float-win-close{background:none;border:none;cursor:pointer;color:var(--ct-tertiary);
  font-size:14px;padding:2px 5px;border-radius:4px;line-height:1;transition:all .12s}
.float-win-close:hover{background:rgba(248,113,113,0.15);color:var(--ct-danger)}
.float-win-body{padding:14px 16px;max-height:min(520px,70vh);overflow-y:auto}

/* Grille outils (fond) */
.toolbox-grid-hint{position:absolute;inset:0;pointer-events:none;opacity:0.03;
  background-image:linear-gradient(var(--cbr-tertiary) 1px,transparent 1px),
    linear-gradient(90deg,var(--cbr-tertiary) 1px,transparent 1px);
  background-size:40px 40px}
html.light .toolbox-grid-hint{opacity:0.07}

/* ── BOARD HEADER : boutons icônes identiques ── */
#btn-suggestions, #btn-board-interactions {
  width: 30px !important;
  height: 30px !important;
  padding: 0 !important;
  border-radius: 50% !important;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#btn-suggestions svg, #btn-board-interactions svg {
  width: 14px !important;
  height: 14px !important;
  flex-shrink: 0;
  display: block;
}

.pwd-wrap{position:relative;margin-bottom:10px}
.pwd-wrap input{margin-bottom:0;padding-right:38px}
.pwd-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--ct-tertiary);font-size:16px;
  padding:3px 4px;line-height:1;transition:color .15s}
.pwd-eye:hover{color:var(--ct-primary)}

/* ── NAVIGATION PROF PERMANENTE ── */
.prof-shell{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
.prof-nav{position:sticky;top:0;z-index:30;background:var(--cb-primary);
  border-bottom:0.5px solid var(--cbr-tertiary);display:flex;align-items:stretch;
  padding:0 16px;gap:0;flex-shrink:0}
html.light .prof-nav{background:#fff;box-shadow:0 1px 8px rgba(80,100,150,0.08)}
.prof-nav-logo{display:flex;align-items:center;gap:8px;padding:12px 16px 12px 0;
  border-right:0.5px solid var(--cbr-tertiary);margin-right:8px;flex-shrink:0}
.prof-nav-logo-txt{font-size:13px;font-weight:600;color:var(--ct-primary)}
.prof-nav-logo-sub{font-size:10px;color:var(--ct-tertiary)}
.prof-tab{display:flex;align-items:center;gap:6px;padding:0 14px;font-size:12px;
  font-weight:500;color:var(--ct-tertiary);cursor:pointer;border:none;background:none;
  border-bottom:2px solid transparent;transition:all .15s;font-family:var(--font-sans);
  white-space:nowrap;min-height:48px}
.prof-tab:hover{color:var(--ct-secondary)}
.prof-tab.active{color:var(--ct-info);border-bottom-color:var(--ct-info)}
html.light .prof-tab.active{color:var(--ct-info)}
.prof-tab svg{flex-shrink:0;opacity:.7}
.prof-tab.active svg{opacity:1}
.btn-logout:hover{color:var(--ct-danger)!important;border-color:var(--cbr-danger)!important;background:var(--cb-danger)!important}
.prof-nav-end{margin-left:auto;display:flex;align-items:center;gap:8px;padding:0 0 0 8px}
.prof-content{flex:1;padding:1.2rem;max-width:700px;width:100%;margin:0 auto;box-sizing:border-box}
/* Menu FAB prof */
.prof-fab-item{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border-radius:8px;border:none;background:none;color:var(--ct-secondary);font-size:12px;font-family:var(--font-sans);cursor:pointer;text-align:left;transition:background .12s}
.prof-fab-item:hover{background:var(--cb-secondary);color:var(--ct-primary)}
html.light .prof-fab-item:hover{background:var(--cb-secondary)}
/* Notif items */
.notif-item{padding:10px 12px;border-radius:8px;border:0.5px solid var(--cbr-tertiary);background:var(--cb-secondary);margin-bottom:8px}
.notif-item.unread{border-color:var(--cbr-info);background:var(--cb-info)}
.notif-item.low{border-color:var(--cbr-warning);background:var(--cb-warning)}
.notif-item-title{font-size:12px;font-weight:500;color:var(--ct-primary);margin-bottom:2px}
.notif-item-sub{font-size:11px;color:var(--ct-secondary)}
.notif-item-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}

/* Écran accueil prof */
.home-welcome{text-align:center;padding:2rem 1rem 1rem}
.home-welcome-title{font-size:24px;font-weight:700;color:var(--ct-primary);margin-bottom:4px}
.home-welcome-sub{font-size:13px;color:var(--ct-secondary);margin-bottom:2rem}
.home-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:2rem}
.home-card{background:var(--cb-secondary);border:0.5px solid var(--cbr-tertiary);border-radius:14px;
  padding:20px 16px;text-align:center;cursor:pointer;transition:all .18s;user-select:none}
.home-card:hover{background:var(--cb-info);border-color:var(--cbr-info);transform:translateY(-2px);
  box-shadow:0 4px 20px rgba(55,138,221,0.15)}
html.light .home-card{background:#fff;box-shadow:0 1px 4px rgba(100,120,160,0.06)}
html.light .home-card:hover{background:var(--cb-info)}
.home-card-icon{margin-bottom:10px;color:var(--ct-secondary)}
.home-card:hover .home-card-icon{color:var(--ct-info)}
.home-card-title{font-size:13px;font-weight:600;color:var(--ct-primary);margin-bottom:3px}
.home-card-sub{font-size:11px;color:var(--ct-tertiary)}

/* ── LOGIN CENTRÉ ── */
#sc-login{display:none;min-height:100vh;min-height:100dvh;align-items:center;justify-content:center;padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0)}
#sc-login.active{display:flex}


/* ── SHARE PANEL TILES ── */
.sp-tile{background:var(--cb-primary);border-radius:8px;border:0.5px solid var(--cbr-tertiary);padding:10px;margin-bottom:8px}
.sp-tile-actions{display:flex;gap:4px;margin-top:6px}
.sp-tile-edit{flex:1;padding:4px;background:none;border:0.5px solid var(--cbr-tertiary);border-radius:6px;color:var(--ct-tertiary);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px}
.sp-tile-edit:hover{color:var(--ct-primary);border-color:var(--cbr-secondary)}
.sp-tile-del{padding:4px 8px;background:none;border:0.5px solid var(--cbr-danger);border-radius:6px;color:var(--ct-danger);font-size:11px;cursor:pointer}
.sp-tile-del:hover{background:var(--cb-danger)}
.sp-tile-body{cursor:default}
html.light .sp-tile{background:#fff}
/* ── BADGES COLLECTORS ── */
.badges-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.badge-chip{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:default}
.badge-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;position:relative;transition:transform .15s}
.badge-icon:hover{transform:scale(1.1)}
.badge-locked .badge-icon{background:var(--cb-secondary);border:1px solid var(--cbr-tertiary);opacity:.4;filter:grayscale(1)}
.badge-unlocked .badge-icon{border:1.5px solid transparent}
.badge-label{font-size:9px;color:var(--ct-tertiary);text-align:center;max-width:52px;line-height:1.2}
.badge-unlocked .badge-label{color:var(--ct-secondary)}

html.light .btn-back-tree,html.light .hud-top .btn{background:rgba(255,255,255,0.88)!important;color:var(--ct-primary)!important;border-color:var(--cbr-secondary)!important}
html.light .congrats-overlay .btn-info{background:#1e3a6e!important;color:#fff!important;border-color:#1e3a6e!important;}
html.light .congrats-overlay .btn-info:hover{background:#163060!important;border-color:#163060!important;}

/* ── Fixs largeur mobile supplémentaires ── */
@media (max-width: 600px) {
  /* Éviter les dépassements horizontaux */
  .app, .prof-content, .modal-box, .ce-section, .ep-header {
    max-width: 100%;
    overflow-x: hidden;
  }
  /* Boîte à outils : iframe Spotify responsive */
  #toolbox-scroll iframe { width: 100% !important; }
  /* Barre de métronome : boutons qui s'adaptent */
  #metro-panel .btn-sm { flex: 1; min-width: 0; font-size: 10px; }
  /* Partage : colonnes min-width plus petites */
  .board-col { min-width: 240px !important; max-width: 92vw !important; }
  /* Skill rows : wrap les boutons */
  .skill-edit-row { flex-wrap: wrap; gap: 6px; }
  .seg { flex-shrink: 0; }
  /* Formulaires prof */
  .prof-content input, .prof-content select, .prof-content textarea { box-sizing: border-box; }
  /* Home cards sur mobile : 2 colonnes */
  .home-cards { grid-template-columns: repeat(2, 1fr) !important; }
  /* Grille toolbox : 2 colonnes sur mobile (plus grande zone de tap) */
  #toolbox-scroll .home-card { padding: 14px 8px !important; }
  #toolbox-scroll [style*="grid-template-columns:repeat(3"] { grid-template-columns: repeat(2,1fr) !important; }

  /* ── NAV PROF MOBILE : barre basse fixe ── */
  .prof-shell { padding-bottom: calc(56px + env(safe-area-inset-bottom, 0px)); }
  .prof-nav {
    position: fixed !important;
    top: auto !important;
    bottom: 0; left: 0; right: 0;
    padding: 0 0 env(safe-area-inset-bottom, 0px) 0 !important;
    gap: 0 !important;
    z-index: 50;
    border-top: 0.5px solid var(--cbr-tertiary);
    border-bottom: none !important;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.18);
    height: calc(56px + env(safe-area-inset-bottom, 0px));
  }
  .prof-nav { overflow: hidden; }
  /* Onglets : icône + titre réduit, répartis sur toute la largeur */
  .prof-tab { font-size: 10px !important; padding: 0 4px !important; gap: 3px !important; flex-direction: column !important; min-height: 52px !important; flex: 1 !important; justify-content: center !important; align-items: center !important; }
  .prof-tab svg { opacity: 1 !important; width: 20px !important; height: 20px !important; }
  /* Fin de nav : icônes plus petites, moins d'espace */
  .prof-nav-end { padding: 0 4px !important; gap: 4px !important; flex-shrink: 0; }
  .prof-nav-end .btn { padding: 5px 6px !important; min-width: 32px; }
  .prof-nav-end .btn svg { width: 14px !important; height: 14px !important; }
  .prof-content { padding: 0.8rem 0.75rem !important; }

  /* ── CARTES ÉLÈVES compactes mobile ── */
  .std-row {
    padding: 8px 10px !important;
    gap: 8px !important;
    position: relative;
  }
  .std-row .avatar { width: 32px !important; height: 32px !important; font-size: 11px !important; flex-shrink: 0; }
  /* Masquer les boutons secondaires, garder seulement Arbre + Éditer dans un menu compact */
  .std-row-actions { display: flex; gap: 4px; flex-wrap: wrap; }

  /* Masquer les labels textuels des boutons d'action élève sur mobile */
  .btn-label-hide { display: none; }
  /* Boutons actions élèves : icônes seulement */
  .std-row-actions .btn { padding: 5px 7px !important; }

  /* ── ARBRE mobile ── */
  #sc-tree { overflow: hidden; }
  .popup { width: min(88vw, 220px) !important; font-size: 12px !important; }

  /* ── HUD TOPBAR MOBILE : disposition normale (gauche ← → droite) ── */
  .hud-topbar {
    justify-content: flex-start !important;
    gap: 8px !important;
    padding: 10px 12px !important;
  }
  .hud-topbar .btn {
    display: flex !important;
    align-items: center !important;
    gap: 5px !important;
    padding: 6px 12px !important;
    font-size: 11px !important;
    min-height: 34px !important;
    backdrop-filter: blur(6px);
  }
  .hud-topbar .btn svg { width: 14px !important; height: 14px !important; flex-shrink: 0; }
  /* Restaurer le spacer */
  .hud-topbar > div[style*="flex:1"] { display: flex !important; }
  /* Bouton retour : toujours en premier à gauche */
  #btn-back-tree { order: -1; }

  /* ── BOARD PARTAGE mobile : header collé en haut comme les autres ── */
  .board-inner { padding: 0 !important; display: flex; flex-direction: column; }
  .board-header {
    position: sticky !important;
    top: 0 !important;
    z-index: 2;
    padding: 10px 12px !important;
    margin-bottom: 0 !important;
    background: var(--cb-primary) !important;
    border-bottom: 0.5px solid var(--cbr-tertiary) !important;
    flex-wrap: nowrap !important;
  }
  html.light .board-header { background: #fff !important; }
  .board-header-title { font-size: 15px !important; }
  .board-header-sub { display: none !important; }
  .board-columns-wrap { padding: 10px 10px 12px !important; }

  /* ── AGENDA ── */
  .ag-topbar { padding: 8px 10px !important; gap: 6px !important; }
  .ag-topbar .btn { padding: 5px 9px !important; font-size: 11px !important; }
  .ag-topbar .btn-sm { padding: 4px 8px !important; }
  /* Sync : icône seule */
  .ag-sync-btn { padding: 6px 8px !important; }
  .ag-sync-label { display: none !important; }
  /* Vues : abréviations */
  .ag-view-label { display: none !important; }
  .ag-view-icon { display: inline !important; }
  .ag-view-btn { padding: 4px 10px !important; font-size: 11px !important; }
  /* Nom du mois : tronquer si besoin */
  #ag-period-label { font-size: 13px !important; }
  /* Agenda : colonnes à largeur strictement fixe */
  .ag-month-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr)) !important;
    table-layout: fixed;
    width: 100%;
  }
  .ag-month-cell {
    min-height: 54px !important;
    overflow: hidden;
    word-break: break-all;
  }
  .ag-month-chip { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
  .ag-week-wrap {
    grid-template-columns: 32px repeat(7, minmax(0, 1fr)) !important;
    width: 100%;
  }
  .ag-week-daylabel { font-size: 9px !important; padding: 4px 1px !important; }
  .ag-week-daylabel .ag-week-daynum { font-size: 13px !important; }

  /* ── COHÉRENCE BOUTONS RETOUR — même position sur tous les écrans ── */
  /* Chaque topbar a un padding gauche identique et le btn retour est toujours le 1er élément */
  .toolbox-topbar,
  .ag-topbar,
  .board-header {
    padding-left: 12px !important;
    padding-top: 10px !important;
    padding-bottom: 10px !important;
  }
  /* Style uniforme pour tous les boutons "Retour" */
  .toolbox-topbar .btn:first-child,
  .ag-topbar .btn:first-child,
  .board-header .btn:first-child,
  #btn-back-tree {
    padding: 6px 12px !important;
    font-size: 11px !important;
    min-height: 34px !important;
    display: inline-flex !important;
    align-items: center !important;
    gap: 5px !important;
    background: rgba(15,20,32,0.75) !important;
    backdrop-filter: blur(6px) !important;
    flex-shrink: 0;
  }
  html.light .toolbox-topbar .btn:first-child,
  html.light .ag-topbar .btn:first-child,
  html.light .board-header .btn:first-child,
  html.light #btn-back-tree {
    background: rgba(255,255,255,0.88) !important;
  }
  #btn-recenter-tree { font-size: 11px !important; padding: 5px 14px !important; }
}

</style>
</head>
<body>
<div class="app">

<!-- LOGIN -->
<div id="sc-login" class="screen active">
  <div style="max-width:340px;width:100%;padding:1rem">
    <!-- En-tête -->
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:32px;margin-bottom:8px">🎷</div>
      <div style="font-size:18px;font-weight:700;color:var(--ct-primary);margin-bottom:2px">Classes de Louis Dordain</div>
      <div style="font-size:12px;color:var(--ct-secondary)">Saxophone</div>
    </div>

    <!-- Étape 1 : choix du rôle -->
    <div id="login-step1" style="background:var(--cb-primary);border:0.5px solid var(--cbr-tertiary);border-radius:var(--br-lg);padding:20px">
      <div style="font-size:12px;color:var(--ct-secondary);text-align:center;margin-bottom:16px">Je me connecte en tant que…</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="btn" id="login-btn-eleve" style="padding:14px;font-size:14px;border-radius:var(--br-lg);border-color:var(--cbr-secondary);display:flex;align-items:center;justify-content:center;gap:8px" onclick="selectLoginRole('eleve')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> Élève</button>
        <button class="btn" id="login-btn-prof" style="padding:14px;font-size:14px;border-radius:var(--br-lg);border-color:var(--cbr-secondary);display:flex;align-items:center;justify-content:center;gap:8px" onclick="selectLoginRole('prof')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg> Professeur</button>
      </div>
    </div>

    <!-- Étape 2 élève : sélecteur école + prénom nom + mot de passe -->
    <div id="login-step2-eleve" style="display:none;background:var(--cb-primary);border:0.5px solid var(--cbr-tertiary);border-radius:var(--br-lg);padding:16px">
      <button onclick="backToStep1()" style="background:none;border:none;color:var(--ct-tertiary);cursor:pointer;font-size:12px;margin-bottom:10px;padding:0;display:flex;align-items:center;gap:4px;font-family:var(--font-sans)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg> Retour</button>
      <div id="login-school-wrap">
        <div class="field-label" style="margin-bottom:6px">Mon école</div>
        <select id="login-school" style="margin-bottom:4px" onchange="saveSchoolPref()"></select>
        <div style="font-size:10px;color:var(--ct-tertiary);margin-bottom:10px">Ton choix est mémorisé sur cet appareil.</div>
      </div>
