<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Updated border thickness */
        .board-column {
            border: 1.5px solid #ccc;
        }
        .tile {
            border: 1.5px solid #ccc;
        }
    </style>
    <script>
        // PDF opening functionality
        function openPDF(url) {
            window.open(url, '_blank');
        }

        function handleTileClick(event) {
            const tile = event.currentTarget;
            const pdfUrl = tile.getAttribute('data-pdf-url');
            if (pdfUrl) {
                openPDF(pdfUrl);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const pdfTiles = document.querySelectorAll('.pdf-tile');
            pdfTiles.forEach(tile => {
                tile.addEventListener('click', handleTileClick);
            });
        });
    </script>
</head>
<body>
    <!-- New dropdown menu replacing buttons -->
    <div class="dropdown">
        <button class="dropbtn">Options</button>
        <div class="dropdown-content">
            <a href="#delete">Delete</a>
            <a href="#color">Change Color</a>
        </div>
    </div>
    <!-- Example PDF tile -->
    <div class="tile pdf-tile" data-pdf-url="path/to/your/file.pdf">Open PDF Tile</div>
</body>
</html>
